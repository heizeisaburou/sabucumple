<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>¡Feliz Cumpleaños Sabu!</title>
  <link rel="stylesheet" href="/leinSeab/style.css">
</head>
<body>

  <canvas id="canvas"></canvas>
  
  <!-- Botón disparador del panel de sonido -->
  <button class="sound-toggle-btn" id="soundToggleBtn" aria-label="Configurar sonido">🔊</button>

  <!-- Panel de Configuración de Sonido -->
  <div class="sound-config" id="soundConfig">
    <h3>Sonido 🔊</h3>
    <div class="config-row">
      <label for="muteToggle">Habilitado</label>
      <label class="switch">
        <input type="checkbox" id="muteToggle" checked>
        <span class="slider"></span>
      </label>
    </div>
    <div class="config-row">
      <label for="volumeSlider">Volumen</label>
      <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.5">
    </div>
    <div class="config-row">
      <label for="soundType">Fuegos Art.</label>
      <select id="soundType">
        <option value="both">Sinte + Ruido</option>
        <option value="synth">Solo Sintetizador</option>
        <option value="noise">Solo Explosión</option>
      </select>
    </div>
  </div>

  <!-- Bloque inicial del Corazón -->
  <div class="gift-wrapper" id="giftWrapper">
    <div class="heart-box" id="giftButton">
      <svg viewBox="0 0 24 24" class="heart-svg">
        <defs>
          <linearGradient id="heartGradient" x1="0" y1="1" x2="0" y2="0">
            <stop id="fillStop" offset="0%" stop-color="#ff2a74" />
            <stop id="emptyStop" offset="0%" stop-color="#121225" />
          </linearGradient>
        </defs>
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" 
              fill="url(#heartGradient)" 
              stroke="#ff2a74" 
              stroke-width="1.5" />
      </svg>
    </div>
    <div class="gift-hint" id="giftHint">Haz clic en el corazón</div>
  </div>

  <!-- Bloque de felicitación oculto al principio -->
  <div class="interface" id="congratsInterface">
    <h1>¡Feliz Cumpleaños, Sabu! 🎆</h1>
    <p>Haz clic en la pantalla para lanzar más fuegos artificiales</p>
    <a href="/" class="back-btn" id="backBtn">← Volver al inicio</a>
  </div>

  <script src="/leinSeab/main.js"></script>
</body>
</html>
